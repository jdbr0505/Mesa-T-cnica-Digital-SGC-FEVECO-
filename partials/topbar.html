<header class="top-bar">
    <div>
        <h1 id="page-title">Eventos y temporadas</h1>
        <p class="top-context" id="top-context">Selecciona un evento para comenzar</p>
    </div>
    <div class="top-bar-right context-controls">
        <label class="context-field">
            <span>Temporada</span>
            <select id="global-season-select" aria-label="Temporada activa"></select>
        </label>
        <label class="context-field">
            <span>Evento</span>
            <select id="global-event-select" aria-label="Evento activo"></select>
        </label>
        <span class="status-badge" id="event-status-badge">Sin evento</span>
    </div>
</header>
